<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>在线商城系统</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #ddd; padding-bottom: 10px; color: #333; }

        /* 登录 & 注册 */
        #login-box, #register-box { text-align: center; margin-top: 50px; }
        input, select, textarea { padding: 10px; margin: 5px; border: 1px solid #ddd; border-radius: 5px; width: 200px; }
        textarea { width: 80%; height: 60px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        button:hover { background-color: #0056b3; }
        button.red { background-color: #dc3545; }
        button.green { background-color: #28a745; }
        button.orange { background-color: #fd7e14; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        .link-btn { background: none; color: #007bff; text-decoration: underline; padding: 5px; font-size: 14px; }

        /* 商品列表 */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .product-card { border: 1px solid #eee; padding: 15px; border-radius: 8px; text-align: center; transition: 0.3s; }
        .product-card:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .price { color: #e65100; font-weight: bold; font-size: 1.2em; }

        /* 表格 */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 14px; }
        th { background-color: #f8f9fa; }

        /* 通用类 */
        .hidden { display: none; }
        .section { margin-bottom: 40px; border: 1px solid #f1f1f1; padding: 15px; border-radius: 8px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

        /* 分页控件样式 */
        .pagination-bar { margin-top: 15px; text-align: right; }
        .pagination-bar span { margin: 0 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">

    <div id="top-bar" class="header hidden">
        <div>👤 当前用户: <span id="current-user" style="font-weight:bold"></span></div>
        <button class="red" onclick="logout()">退出登录</button>
    </div>

    <div id="login-box">
        <h1>🏬 Karl的在线炸鸡店</h1>
        <div style="margin-bottom: 20px; color: #666; font-size: 14px;">管理员与普通用户共用平台</div>
        <input type="text" id="username" placeholder="用户名">
        <input type="password" id="password" placeholder="密码">
        <br>
        <button onclick="login()">登录</button>
        <br>
        <button class="link-btn" onclick="toggleAuth('register')">没有账号？点此注册</button>
    </div>

    <div id="register-box" class="hidden">
        <h1>🆕 新用户注册</h1>
        <div style="margin-bottom: 10px; color: #666; font-size: 14px;">请填写邮箱以接收发货通知</div>
        <input type="text" id="reg-username" placeholder="用户名 (必填)">
        <input type="text" id="reg-name" placeholder="昵称/姓名">
        <input type="text" id="reg-email" placeholder="电子邮箱 (如 xxx@qq.com)">
        <input type="password" id="reg-password" placeholder="设置密码 (必填)">
        <br>
        <button class="green" onclick="register()">立即注册</button>
        <br>
        <button class="link-btn" onclick="toggleAuth('login')">已有账号？返回登录</button>
    </div>

    <div id="customer-app" class="hidden">
        <h2>🛍️ 商品选购</h2>
        <div class="product-grid" id="product-list"></div>

        <div class="section">
            <h3>🛒 我的购物车</h3>
            <table id="cart-table">
                <thead><tr><th>商品</th><th>单价</th><th>数量</th><th>小计</th><th>操作</th></tr></thead>
                <tbody id="cart-body"></tbody>
            </table>
            <div style="text-align: right; margin-top: 10px;">
                <button class="green" onclick="checkout()">一键结账下单</button>
            </div>
        </div>

        <div class="section">
            <h3>🧾 我的历史订单</h3>
            <button onclick="loadMyOrders()">刷新列表</button>
            <table>
                <thead><tr><th>订单号</th><th>商品</th><th>数量</th><th>总价</th><th>状态</th><th>操作</th></tr></thead>
                <tbody id="my-order-body"></tbody>
            </table>
        </div>
    </div>

    <div id="admin-app" class="hidden">
        <div class="section">
            <h3>➕ 商品管理</h3>
            <input type="text" id="p-name" placeholder="商品名称">
            <input type="number" id="p-price" placeholder="价格">
            <input type="number" id="p-stock" placeholder="库存">
            <input type="text" id="p-image" placeholder="图片名">
            <br><textarea id="p-desc" placeholder="商品描述"></textarea><br>
            <button class="green" onclick="addProduct()">上架商品</button>
        </div>

        <div class="section">
            <h3>📦 订单管理 (发货)</h3>
            <button class="orange" onclick="loadAllOrders()">刷新所有订单</button>

            <table>
                <thead><tr><th>订单号</th><th>用户ID</th><th>商品</th><th>数量</th><th>总价</th><th>状态</th><th>操作</th></tr></thead>
                <tbody id="admin-order-body"></tbody>
            </table>

            <div class="pagination-bar">
                <button id="btn-prev" onclick="changePage(-1)">上一页</button>
                <span id="page-info">第 1 页</span>
                <button id="btn-next" onclick="changePage(1)">下一页</button>
            </div>
        </div>

        <div class="section">
            <h3>📈 销售统计报表 (Dashboard)</h3>
            <button class="orange" onclick="loadStats()">查看营收情况</button>
            <table style="margin-top:10px">
                <thead>
                <tr style="background:#fff3cd">
                    <th>商品名称</th>
                    <th>累计销量 (份)</th>
                    <th>累计收入 (元)</th>
                </tr>
                </thead>
                <tbody id="stats-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API_BASE = "";

    // 全局变量
    let currentUserId = null;
    let currentUserRole = 0;

    // 分页变量
    let allAdminOrders = [];
    let currentPage = 1;
    const pageSize = 5;

    // 自动登录
    window.onload = function() {
        const savedUser = localStorage.getItem('shop_user');
        if (savedUser) {
            handleLoginSuccess(JSON.parse(savedUser));
        }
    }

    function toggleAuth(mode) {
        if(mode === 'register') {
            document.getElementById('login-box').classList.add('hidden');
            document.getElementById('register-box').classList.remove('hidden');
        } else {
            document.getElementById('register-box').classList.add('hidden');
            document.getElementById('login-box').classList.remove('hidden');
        }
    }

    async function register() {
        const username = document.getElementById('reg-username').value;
        const name = document.getElementById('reg-name').value;
        const password = document.getElementById('reg-password').value;
        const email = document.getElementById('reg-email').value;

        if(!username || !password) { alert("用户名和密码不能为空！"); return; }

        const res = await fetch(`${API_BASE}/user/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, name, email })
        });
        const result = await res.json();
        if (result.code === 1) {
            alert("✅ 注册成功！请登录");
            toggleAuth('login');
        } else {
            alert("❌ 注册失败: " + result.msg);
        }
    }

    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        const res = await fetch(`${API_BASE}/user/login`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const result = await res.json();

        if (result.code === 1) {
            localStorage.setItem('shop_user', JSON.stringify(result.data));
            handleLoginSuccess(result.data);
        } else {
            alert("登录失败: " + result.msg);
        }
    }

    function handleLoginSuccess(user) {
        currentUserId = user.id;
        currentUserRole = user.role;
        const roleName = currentUserRole === 1 ? '管理员' : '顾客';

        document.getElementById('current-user').innerText = `${user.name} (${roleName})`;
        document.getElementById('login-box').classList.add('hidden');
        document.getElementById('register-box').classList.add('hidden');
        document.getElementById('top-bar').classList.remove('hidden'); // 显示顶部栏(包含退出按钮)

        if (currentUserRole === 1) {
            document.getElementById('admin-app').classList.remove('hidden');
            loadAllOrders();
        } else {
            document.getElementById('customer-app').classList.remove('hidden');
            loadProducts(); loadCart(); loadMyOrders();
        }
    }

    function logout() {
        localStorage.removeItem('shop_user');
        location.reload();
    }

    // ================= 顾客功能 =================
    async function loadProducts() {
        const res = await fetch(`${API_BASE}/product/list`);
        const result = await res.json();
        const listDiv = document.getElementById('product-list');
        listDiv.innerHTML = '';
        result.data.forEach(p => {
            listDiv.innerHTML += `<div class="product-card"><h3>${p.name}</h3><p class="price">¥${p.price}</p><p style="font-size:12px;color:#888">库存: ${p.stock}</p><button onclick="addToCart(${p.id})">加入</button></div>`;
        });
    }
    async function addToCart(pid) { await fetch(`${API_BASE}/cart/add`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:currentUserId,productId:pid,count:1})}); loadCart(); }
    async function loadCart() {
        const res = await fetch(`${API_BASE}/cart/list?userId=${currentUserId}`);
        const result = await res.json();
        const tbody = document.getElementById('cart-body');
        tbody.innerHTML = '';
        result.data.forEach(item => {
            tbody.innerHTML += `<tr><td>${item.productName}</td><td>${item.price}</td><td><button onclick="decrease(${item.id})">-</button> ${item.count} <button onclick="addToCart(${item.productId})">+</button></td><td>${item.totalMoney}</td><td><button class="red" onclick="removeFromCart(${item.id})">删</button></td></tr>`;
        });
    }
    async function decrease(id) { await fetch(`${API_BASE}/cart/decrease?id=${id}`, {method:'POST'}); loadCart(); }
    async function removeFromCart(id) { await fetch(`${API_BASE}/cart/remove?id=${id}`, {method:'DELETE'}); loadCart(); }
    async function checkout() {
        if(!confirm("确定结算吗？")) return;
        const res = await fetch(`${API_BASE}/order/checkout?userId=${currentUserId}`, {method:'POST'});
        const result = await res.json();
        if(result.code===1){alert(result.data);loadCart();loadMyOrders();}else{alert(result.msg);}
    }
    async function loadMyOrders() {
        const res = await fetch(`${API_BASE}/order/list?userId=${currentUserId}`);
        const result = await res.json();
        renderOrderRows(result.data, document.getElementById('my-order-body'), false);
    }
    async function payOrder(orderNo) {
        await fetch(`${API_BASE}/order/pay?orderNo=${orderNo}`, {method:'POST'});
        alert("支付成功"); currentUserRole===1 ? loadAllOrders() : loadMyOrders();
    }

    // ================= 管理员功能 =================

    async function addProduct() {
        const data = {name:document.getElementById('p-name').value,price:document.getElementById('p-price').value,stock:document.getElementById('p-stock').value,image:document.getElementById('p-image').value,description:document.getElementById('p-desc').value};
        const res = await fetch(`${API_BASE}/product/add`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
        if((await res.json()).code===1) alert("上架成功！");
    }

    async function loadAllOrders() {
        const res = await fetch(`${API_BASE}/order/admin/list`);
        const result = await res.json();
        allAdminOrders = result.data;
        currentPage = 1;
        renderAdminPage();
    }

    function renderAdminPage() {
        const start = (currentPage - 1) * pageSize;
        const end = start + pageSize;
        const pageData = allAdminOrders.slice(start, end);

        const tbody = document.getElementById('admin-order-body');
        renderOrderRows(pageData, tbody, true);

        document.getElementById('page-info').innerText = `第 ${currentPage} 页 / 共 ${Math.ceil(allAdminOrders.length / pageSize)} 页`;
        document.getElementById('btn-prev').disabled = (currentPage === 1);
        document.getElementById('btn-next').disabled = (end >= allAdminOrders.length);
    }

    function changePage(delta) {
        currentPage += delta;
        renderAdminPage();
    }

    async function shipOrder(orderNo) {
        if(!confirm(`发货并发送邮件给订单 ${orderNo} ？`)) return;
        const res = await fetch(`${API_BASE}/order/ship?orderNo=${orderNo}`, {method:'POST'});
        if((await res.json()).code===1) { alert("发货成功！邮件已发送！"); loadAllOrders(); }
    }

    async function loadStats() {
        const res = await fetch(`${API_BASE}/order/admin/stats`);
        const result = await res.json();
        const tbody = document.getElementById('stats-body');
        tbody.innerHTML = '';

        let totalMoney = 0;

        if (result.data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3">暂无销售数据</td></tr>';
            return;
        }

        result.data.forEach(item => {
            totalMoney += item.totalRevenue;
            tbody.innerHTML += `
                <tr>
                    <td>${item.productName}</td>
                    <td style="font-weight:bold;color:#007bff">${item.totalSold}</td>
                    <td style="font-weight:bold;color:#28a745">¥ ${item.totalRevenue}</td>
                </tr>
            `;
        });

        tbody.innerHTML += `
            <tr style="background:#f8f9fa;font-weight:bold;border-top:2px solid #ddd">
                <td>💰 全店总计</td>
                <td>-</td>
                <td style="color:#d32f2f;font-size:1.2em">¥ ${totalMoney.toFixed(2)}</td>
            </tr>
        `;
    }

    function renderOrderRows(orders, tbody, isAdmin) {
        tbody.innerHTML = '';
        if (orders.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7">暂无订单数据</td></tr>';
            return;
        }

        orders.forEach(order => {
            let statusHtml = '';
            let actionBtn = '';

            if (order.status === 1) {
                statusHtml = '<span style="color:red;font-weight:bold">待付款</span>';
                if (isAdmin) {
                    actionBtn = '<span style="color:#999;font-size:12px">等待用户付款...</span>';
                } else {
                    actionBtn = `<button class="green" onclick="payOrder('${order.orderNo}')">模拟支付</button>`;
                }
            } else if (order.status === 2) {
                statusHtml = '<span style="color:orange;font-weight:bold">已付款 (待发货)</span>';
                if (isAdmin) {
                    actionBtn = `<button class="orange" onclick="shipOrder('${order.orderNo}')">点击发货</button>`;
                } else {
                    actionBtn = '等待发货...';
                }
            } else if (order.status === 3) {
                statusHtml = '<span style="color:green;font-weight:bold">已发货</span>';
                actionBtn = '✅ 交易完成';
            }

            tbody.innerHTML += `
                <tr>
                    <td style="font-size:12px">${order.orderNo}</td>
                    ${isAdmin ? `<td style="color:#666">User:${order.userId}</td>` : ''}
                    <td>${order.productName}</td>
                    <td>${order.count}</td>
                    <td>${order.totalAmount}</td>
                    <td>${statusHtml}</td>
                    <td>${actionBtn}</td>
                </tr>
            `;
        });
    }
</script>

</body>
</html>
